[package]
authors = ["Roelof J.C. Kluin"]
description = "ollama/chroma command-line AI chat tool"
edition = "2024"
license = "MIT"
name = "ruchat"
repository = "https://github.com/RoelKluin/ruchat"
version = "0.1.2"

[dependencies]
anyhow = "1.0.100"
async-trait = "0.1.89"
chromadb = "2.3.0"
clap = { version = "4.5.49", features = ["derive"] }
crossterm = "0.29.0"
env_logger = "0.11.8"
fs2 = "0.4.3"
log = "0.4.28"
ollama-rs = { version = "0.3.2", features = ["stream", "headers", "tool-implementations", "macros", "modelfile"] }
reqwest = "0.12.24"
schemars = "1.0.4"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.145"
thiserror = "2.0.17"
tokio = { version = "1.48.0", features = ["full"] }
tokio-stream = "0.1.17"
