[package]
name = "ruchat"
version = "0.1.0"
edition = "2024"

[dependencies]
anyhow = "1.0.96"
chromadb = "2.2.2"
clap = { version = "4.5.30", features = ["derive"] }
env_logger = "0.11.6"
log = "0.4.26"
modelfile = "0.3.0"
ollama-rs = { version = "0.2.6", features = ["stream", "headers", "modelfile"] }
serde = { version = "1.0.218", features = ["derive"] }
serde_json = "1.0.139"
thiserror = "2.0.12"
tokio = { version = "1.43.0", features = ["full"] }
tokio-stream = "0.1.17"
