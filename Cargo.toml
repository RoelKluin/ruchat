[package]
authors = ["Roelof J.C. Kluin"]
description = "ollama/chroma command-line AI chat tool"
edition = "2024"
license = "MIT"
name = "ruchat"
repository = "https://github.com/RoelKluin/ruchat"
version = "0.1.2"

[dependencies]
anyhow = "1.0.96"
async-trait = "0.1.88"
chromadb = "2.2.2"
clap = { version = "4.5.30", features = ["derive"] }
crossterm = "0.28.1"
env_logger = "0.11.6"
fs2 = "0.4.3"
log = "0.4.26"
ollama-rs = { version = "0.3.0", features = ["stream", "headers", "tool-implementations", "macros", "modelfile"] }
reqwest = "0.12.15"
schemars = "0.8.22"
serde = { version = "1.0.218", features = ["derive"] }
serde_json = "1.0.139"
thiserror = "2.0.12"
tokio = { version = "1.43.0", features = ["full"] }
tokio-stream = "0.1.17"
